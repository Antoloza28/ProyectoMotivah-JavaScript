<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Motivah Shop</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header>
<h1>Motivah Shop</h1>
<div id="contador-carrito">🛒 0</div>
</header>

<main>

<section>
<h2>Productos</h2>
<div id="productos" class="grid-productos"></div>
</section>

<section class="carrito">
<h2>Carrito</h2>
<ul id="carrito"></ul>
<p id="total">Total: $0</p>

<button id="comprar">Finalizar compra</button>
<button id="vaciar">Vaciar carrito</button>
</section>

<section>
<h2>Datos del comprador</h2>

<form id="formulario" class="form" style="display:none">
<input type="text" id="nombre" placeholder="Nombre completo" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="direccion" placeholder="Dirección de envío" required>
<button type="submit">Confirmar compra</button>
</form>

</section>

</main>

<script src="js/main.js"></script>

</body>
</html>
